apiVersion: v1
kind: Service
metadata:
  name: {{ include "presidio.anonymizer.fullname" . }}
  labels:
    {{- include "presidio.anonymizer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.anonymizer.service.type }}
  ports:
    - port: {{ .Values.anonymizer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "presidio.anonymizer.selectorLabels" . | nindent 4 }}

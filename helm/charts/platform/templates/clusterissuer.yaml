apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: {{ .Values.acmeServer | quote }}
    email: {{ .Values.acmeEmail | quote }}
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          acmeDNS:
            host: {{ .Values.acmeDNS.host | quote }}
            accountSecretRef:
              name: {{ .Values.acmeDNS.secretName | quote }}
              key: {{ .Values.acmeDNS.secretKey | quote }}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coder
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.coderDomain | quote }}
      secretName: {{ .Values.tls.commonSecretName }}
    - hosts:
        - {{ .Values.tls.coderWildcardDomain | quote }}
      secretName: {{ .Values.tls.coderSecretName }}
  rules:
    - host: {{ .Values.coderDomain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coder
                port:
                  number: 80
    - host: {{ .Values.tls.coderWildcardDomain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coder
                port:
                  number: 80
    {{- if .Values.cloudflare.coderDomain }}
    - host: {{ .Values.cloudflare.coderDomain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coder
                port:
                  number: 80
    {{- end }}
    {{- if .Values.cloudflare.coderWildcardDomain }}
    - host: {{ .Values.cloudflare.coderWildcardDomain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coder
                port:
                  number: 80
    {{- end }}


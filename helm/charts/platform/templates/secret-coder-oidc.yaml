{{- if and .Values.coder .Values.coder.oidc }}
{{- $oidc := .Values.coder.oidc }}
{{- if $oidc.issuerUrl }}
{{- if not $oidc.clientId }}
{{- fail "CODER_OIDC_CLIENT_ID is required when CODER_OIDC_ISSUER_URL is set" }}
{{- end }}
{{- if not $oidc.clientSecret }}
{{- fail "CODER_OIDC_CLIENT_SECRET is required when CODER_OIDC_ISSUER_URL is set" }}
{{- end }}
{{- if not $oidc.emailDomain }}
{{- fail "CODER_OIDC_EMAIL_DOMAIN is required when CODER_OIDC_ISSUER_URL is set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: coder-oidc
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  client-secret: {{ $oidc.clientSecret | quote }}
{{- end }}
{{- end }}

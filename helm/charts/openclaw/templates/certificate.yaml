{{- if and .Values.tls .Values.tls.commonWildcardDomain -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.tls.commonSecretName }}
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.tls.commonSecretName }}
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.tls.commonWildcardDomain | quote }}
{{- end }}

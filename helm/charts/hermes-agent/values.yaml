# Default values for hermes-agent.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: docker.io/nousresearch/hermes-agent
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

command: []
args:
  - "gateway"
  - "run"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

rbac:
  # Specifies whether RBAC resources should be created
  create: true
  # Name of the role to create and bind
  roleName: "hermes-agent-role"
  # Name of the playground namespace to create and grant permissions in
  playgroundNamespace: "hermes-playground"

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  # Port configuration inside the cluster
  apiPort: 8642
  dashboardPort: 9119

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: traefik
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  # Host configurations for Ingress.
  # Supports separate hosts for Dashboard and API server if needed,
  # or unified routing.
  hosts:
    - host: hermes.example.com
      paths:
        - path: /
          pathType: Prefix
          portType: dashboard # 'dashboard' or 'api'
  tls: []
  #  - secretName: hermes-tls
  #    hosts:
  #      - hermes.example.com

# Persistence configuration for the /opt/data directory
persistence:
  enabled: true
  # storageClass: "-"
  accessMode: ReadWriteOnce
  size: 10Gi
  existingClaim: ""
  annotations: {}

# Environment variables to pass directly to the container (non-secret settings)
env:
  HERMES_DASHBOARD: "1"
  HERMES_DASHBOARD_HOST: "0.0.0.0"
  HERMES_DASHBOARD_PORT: "9119"
  API_SERVER_ENABLED: "true"
  API_SERVER_HOST: "0.0.0.0"
  API_SERVER_PORT: "8642"
  API_SERVER_CORS_ORIGINS: "*"



  # Default OIDC settings (optional, enabled by specifying values)
  HERMES_DASHBOARD_PUBLIC_URL: ""
  HERMES_DASHBOARD_OIDC_ISSUER: ""
  HERMES_DASHBOARD_OIDC_CLIENT_ID: ""
  HERMES_DASHBOARD_OIDC_SCOPES: "openid profile email"

# Credentials and API keys. These will be stored in a Kubernetes Secret
# and injected as environment variables.
#
# If you prefer to use an existing secret (e.g. managed by the Makefile or ExternalSecrets),
# specify its name in existingSecret.
existingSecret: ""
secrets:
  # API Server Secret Key (highly recommended for security)
  API_SERVER_KEY: ""

  # Dashboard Authentication Settings (Authelia OIDC Secret)
  HERMES_DASHBOARD_OIDC_CLIENT_SECRET: ""

# mTLS protection settings
mtls:
  enabled: false

resources: {}
  # We usually recommend at least 1-2 CPUs and 2-4 GiB memory due to Playwright and python runtimes
  # limits:
  #   cpu: 2000m
  #   memory: 4Gi
  # requests:
  #   cpu: 500m
  #   memory: 1Gi

nodeSelector: {}

tolerations: []

affinity: {}

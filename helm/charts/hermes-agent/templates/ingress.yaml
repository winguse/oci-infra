{{- if .Values.ingress.enabled -}}
{{- $fullName := include "hermes-agent.fullname" . -}}
{{- $svcPortDashboard := .Values.service.dashboardPort -}}
{{- $svcPortApi := .Values.service.apiPort -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
  {{- if or .Values.mtls.enabled .Values.ingress.annotations }}
  annotations:
    {{- if .Values.mtls.enabled }}
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.options: {{ printf "%s-%s-mtls@kubernetescrd" .Release.Namespace $fullName | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ if eq .portType "api" }}{{ $svcPortApi }}{{ else }}{{ $svcPortDashboard }}{{ end }}
          {{- end }}
    {{- end }}
{{- end }}

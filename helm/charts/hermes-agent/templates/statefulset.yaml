apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hermes-agent.fullname" . }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "hermes-agent.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hermes-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "hermes-agent.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "hermes-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.codeServer.enabled }}
      initContainers:
        - name: init-etc
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              cp /etc/passwd /tmp/etc/passwd
              echo "hermes:x:10000:10000::/opt/data:/bin/bash" >> /tmp/etc/passwd
              cp /etc/group /tmp/etc/group
              echo "hermes:x:10000:" >> /tmp/etc/group
              cp /etc/shadow /tmp/etc/shadow
              echo "hermes::19000:0:99999:7:::" >> /tmp/etc/shadow
              chmod 0640 /tmp/etc/shadow
              mkdir -p /tmp/etc/sudoers.d
              echo "hermes ALL=(ALL) NOPASSWD:ALL" > /tmp/etc/sudoers.d/hermes
              chmod 0440 /tmp/etc/sudoers.d/hermes
          volumeMounts:
            - name: etc-volume
              mountPath: /tmp/etc
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.command }}
          command:
            {{- toYaml .Values.command | nindent 12 }}
          {{- end }}
          {{- if .Values.args }}
          args:
            {{- toYaml .Values.args | nindent 12 }}
          {{- end }}
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- if or .Values.existingSecret .Values.secrets }}
          envFrom:
            - secretRef:
                name: {{ include "hermes-agent.secretName" . }}
          {{- end }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /opt/data

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.codeServer.enabled }}
        - name: code-server
          {{- if .Values.codeServer.securityContext }}
          securityContext:
            {{- toYaml .Values.codeServer.securityContext | nindent 12 }}
          {{- end }}
          image: "{{ .Values.codeServer.image.repository }}:{{ .Values.codeServer.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.codeServer.image.pullPolicy | default "IfNotPresent" }}
          {{- if .Values.codeServer.args }}
          args:
            {{- toYaml .Values.codeServer.args | nindent 12 }}
          {{- end }}
          ports:
            - name: code-server
              containerPort: 8080
              protocol: TCP
          env:
            - name: HOME
              value: /opt/data/home
            - name: SHELL
              value: /usr/bin/zsh
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: etc-volume
              mountPath: /etc/passwd
              subPath: passwd
            - name: etc-volume
              mountPath: /etc/group
              subPath: group
            - name: etc-volume
              mountPath: /etc/shadow
              subPath: shadow
            - name: etc-volume
              mountPath: /etc/sudoers.d/hermes
              subPath: sudoers.d/hermes
          {{- if .Values.codeServer.resources }}
          resources:
            {{- toYaml .Values.codeServer.resources | nindent 12 }}
          {{- end }}
        {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ if .Values.persistence.existingClaim }}{{ .Values.persistence.existingClaim }}{{ else }}{{ include "hermes-agent.fullname" . }}-data{{ end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.codeServer.enabled }}
        - name: etc-volume
          emptyDir: {}
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

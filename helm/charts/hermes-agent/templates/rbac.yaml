{{- if .Values.rbac.create -}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.rbac.playgroundNamespace | default "hermes-playground" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.rbac.roleName | default "hermes-agent-role" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.rbac.roleName | default "hermes-agent-role" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "hermes-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Values.rbac.roleName | default "hermes-agent-role" }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.rbac.roleName | default "hermes-agent-role" }}
  namespace: {{ .Values.rbac.playgroundNamespace | default "hermes-playground" }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.rbac.roleName | default "hermes-agent-role" }}
  namespace: {{ .Values.rbac.playgroundNamespace | default "hermes-playground" }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "hermes-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Values.rbac.roleName | default "hermes-agent-role" }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}

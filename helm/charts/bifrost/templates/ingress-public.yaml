{{- if .Values.publicIngress.enabled -}}
{{- $fullName := include "bifrost.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-public
  labels:
    {{- include "bifrost.labels" . | nindent 4 }}
  {{- with .Values.publicIngress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.publicIngress.className }}
  ingressClassName: {{ .Values.publicIngress.className }}
  {{- end }}
  {{- if .Values.publicIngress.tls }}
  tls:
    {{- range .Values.publicIngress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.publicIngress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
